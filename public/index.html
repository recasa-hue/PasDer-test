<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasDer - Pasuruan Transport</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { background: #f4f6f9; display: flex; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .sidebar { width: 250px; background: #343a40; color: #fff; }
        .sidebar .nav-link { color: #c2c7d0; padding: 12px 20px; display: block; text-decoration: none; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #007bff; color: #fff; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .content-header { padding: 15px 0.5rem; }
        .pac-container { z-index: 9999 !important; }
        .custom-file-label::after { content: "Browse"; }
        .card-header { background-color: #043F7F;}
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="sidebar shadow">
        <div class="p-3 border-bottom text-center"><h5>PasDer</h5></div>
        <nav class="mt-2">
            <a href="/" class="nav-link" data-link><i class="fas fa-tachometer-alt mr-2"></i> Dashboard</a>
            <a href="/destinasi" class="nav-link" data-link><i class="fas fa-map-marker-alt mr-2"></i> Destinasi</a>
            <a href="/paket" class="nav-link" data-link><i class="fas fa-box mr-2"></i> Paket</a>
            <a href="/shelter" class="nav-link" data-link><i class="fas fa-bus mr-2"></i> Shelter</a>
        </nav>
    </div>

    <div class="main-content">
        <div id="app"></div>
    </div>

    <script src="/js/db.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
